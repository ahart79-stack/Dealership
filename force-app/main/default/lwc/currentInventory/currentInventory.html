<template>
    <div class="slds-p-around_medium">
        <h2 class="slds-text-heading_medium slds-m-bottom_small">Current Inventory</h2>

        <div class="slds-m-bottom_small slds-grid slds-grid_vertical-align-center">
            <lightning-button-group>
                <lightning-button label="Refresh Inventory" onclick={handleRefresh}></lightning-button>
                <lightning-button label="Filter by Location" onclick={handleToggleLocationFilter}></lightning-button>
                <lightning-button label="Filter by State" onclick={handleToggleStateFilter}></lightning-button>
                <lightning-button label="Filter by District" onclick={handleToggleDistrictFilter}></lightning-button>
                <lightning-button label="Reset Filters" onclick={handleResetFilters}></lightning-button>
            </lightning-button-group>
            <template if:true={selectedLocation}>
                <div class="slds-m-left_small">
                    <lightning-button label="Clear Location Filter" onclick={handleClearLocationFilter}></lightning-button>
                </div>
            </template>
            <template if:true={selectedState}>
                <div class="slds-m-left_small">
                    <lightning-button label="Clear State Filter" onclick={handleClearStateFilter}></lightning-button>
                </div>
            </template>
            <template if:true={selectedDistrict}>
                <div class="slds-m-left_small">
                    <lightning-button label="Clear District Filter" onclick={handleClearDistrictFilter}></lightning-button>
                </div>
            </template>
        </div>

        <template if:true={showLocationFilter}>
            <lightning-combobox
                class="slds-m-bottom_small filter-combobox"
                label="Location"
                options={locationOptions}
                value={selectedLocation}
                onchange={handleLocationChange}
            ></lightning-combobox>
        </template>

        <template if:true={showStateFilter}>
            <lightning-combobox
                class="slds-m-bottom_small filter-combobox"
                label="State"
                options={stateOptions}
                value={selectedState}
                onchange={handleStateChange}
            ></lightning-combobox>
        </template>

        <template if:true={showDistrictFilter}>
            <lightning-combobox
                class="slds-m-bottom_small filter-combobox"
                label="District"
                options={districtOptions}
                value={selectedDistrict}
                onchange={handleDistrictChange}
            ></lightning-combobox>
        </template>

        <lightning-input
            type="search"
            label="Search Inventory"
            placeholder="Search by name, make, year, location, state, district, or color..."
            value={searchTerm}
            onchange={handleSearch}
            class="slds-m-bottom_medium search-input"
        ></lightning-input>

        <template if:true={error}>
            <div class="slds-text-color_error">
                Error loading inventory: {error.body.message}
            </div>
        </template>

        <div class="slds-grid slds-wrap slds-grid_pull-padded">
            <div class="slds-col slds-size_1-of-2 slds-p-horizontal_small">
                <h3 class="slds-text-heading_small slds-m-bottom_small">New Automobiles ({newAutosFiltered.length})</h3>
                <div style="height: 400px; overflow-y: auto;">
                    <lightning-datatable
                        key-field="Id"
                        data={newAutosFiltered}
                        columns={columns}
                        hide-checkbox-column
                        max-row-selection="0"
                    ></lightning-datatable>
                </div>
            </div>

            <div class="slds-col slds-size_1-of-2 slds-p-horizontal_small">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Used Automobiles ({usedAutosFiltered.length})</h3>
                <div style="height: 400px; overflow-y: auto;">
                    <lightning-datatable
                        key-field="Id"
                        data={usedAutosFiltered}
                        columns={columns}
                        hide-checkbox-column
                        max-row-selection="0"
                    ></lightning-datatable>
                </div>
            </div>
        </div>
    </div>
</template>
