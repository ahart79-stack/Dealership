<template>
  <lightning-card title="Create Automobiles">
    <div class="slds-p-around_medium">
      <lightning-button label="Create 25 Random Automobiles (Select Locations)" onclick={handleClick} variant="brand" disabled={loading}></lightning-button>

      <template lwc:if={showLocationSelector}>
        <div class="slds-m-top_medium slds-box slds-theme_default">
          <p class="slds-text-title_bold slds-m-bottom_small">Select Locations</p>
          <lightning-dual-listbox
            name="locations"
            label="Locations"
            source-label="Available"
            selected-label="Selected"
            required
            message-when-value-missing="Select one or more locations, or All."
            options={locationOptions}
            value={selectedLocations}
            onchange={handleLocationChange}
          ></lightning-dual-listbox>

          <div class="slds-m-top_medium">
            <lightning-button label="Cancel" onclick={handleCancelSelection} class="slds-m-right_small" disabled={loading}></lightning-button>
            <lightning-button label="Create Automobiles" onclick={handleConfirmCreate} variant="brand" disabled={loading}></lightning-button>
          </div>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
